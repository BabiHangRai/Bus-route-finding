<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – KTM Bus Finder</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<nav>
  <a class="nav-brand" href="/">🚌 KTM Routes</a>
  <div class="nav-links">
    <a href="/search">Find Route</a>
    <a href="/login">Login</a>
    <a href="/register" class="active">Register</a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <h2>Create Account 🚌</h2>
    <p>Register to save your favourite routes</p>
    <div id="msgBox" class="error-msg"></div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="Ram Bahadur"/>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="your@email.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min. 6 characters"/>
    </div>
    <div class="checkbox-group" style="margin-bottom:1.5rem;">
      <input type="checkbox" id="isStudent"/>
      <label for="isStudent">🎓 I am a student (get 50% fare discount)</label>
    </div>
    <button class="btn btn-primary" onclick="doRegister()">Create Account</button>
    <p style="text-align:center; margin-top:1.2rem; font-size:0.9rem; color:var(--muted);">
      Already have an account? <a href="/login" style="color:var(--primary);">Login</a>
    </p>
  </div>
</div>

<script src="/js/main.js"></script>
<script>
async function doRegister() {
  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const isStudent = document.getElementById('isStudent').checked;

  if (!name || !email || !password) return showMsg('msgBox', 'Please fill all fields');
  if (password.length < 6) return showMsg('msgBox', 'Password must be at least 6 characters');

  const res = await fetch('/api/auth/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, email, password, isStudent })
  });
  const data = await res.json();
  if (data.success) {
    window.location.href = '/dashboard';
  } else {
    showMsg('msgBox', data.error);
  }
}
</script>
</body>
</html>
