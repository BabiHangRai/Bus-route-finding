<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard – KTM Bus Finder</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<nav>
  <a class="nav-brand" href="/">🚌 KTM Routes</a>
  <div class="nav-links">
    <a href="/search">Find Route</a>
    <a href="/all-routes">All Routes</a>
    <a href="/dashboard" class="active" id="nav-dashboard">Dashboard</a>
    <a href="/admin" id="nav-admin" style="display:none">Admin</a>
    <a href="#" onclick="logout()" id="nav-logout">Logout</a>
    <span id="nav-user"></span>
  </div>
</nav>

<div class="container">
  <h1 class="page-title">My Dashboard</h1>
  <p class="page-sub">Welcome back, <strong id="userName">–</strong></p>

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('saved', this)">⭐ Saved Routes</button>
    <button class="tab-btn" onclick="showTab('history', this)">🕒 Search History</button>
  </div>

  <!-- Saved Routes Tab -->
  <div id="tab-saved" class="tab-content active">
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
        <h3>⭐ Saved Routes</h3>
        <a href="/search" class="btn btn-primary btn-sm">+ Find New Route</a>
      </div>
      <div id="savedList"><p style="color:var(--muted);">Loading...</p></div>
    </div>
  </div>

  <!-- Search History Tab -->
  <div id="tab-history" class="tab-content">
    <div class="card">
      <h3 style="margin-bottom:1rem;">🕒 Recent Searches</h3>
      <div id="historyList"><p style="color:var(--muted);">Loading...</p></div>
    </div>
  </div>
</div>

<script src="/js/main.js"></script>
<script>
function showTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

async function loadDashboard() {
  // Check login
  const authRes = await fetch('/api/auth/me');
  const auth = await authRes.json();
  if (!auth.loggedIn) { window.location.href = '/login'; return; }
  document.getElementById('userName').textContent = auth.name;

  // Load saved routes
  const savedRes = await fetch('/api/user/saved');
  const savedData = await savedRes.json();
  const savedList = document.getElementById('savedList');
  if (savedData.savedRoutes.length === 0) {
    savedList.innerHTML = '<p style="color:var(--muted);">No saved routes yet. <a href="/search">Search a route</a> and save it!</p>';
  } else {
    savedList.innerHTML = savedData.savedRoutes.map((r, i) => `
      <div class="history-item">
        <div>
          <div class="history-route">🚌 ${r.from} → ${r.to}</div>
          <div class="history-meta">${r.label}</div>
        </div>
        <div style="display:flex;gap:8px;">
          <a href="/search?from=${r.from}&to=${r.to}" class="btn btn-primary btn-sm">Search Again</a>
          <button class="btn btn-danger btn-sm" onclick="deleteSaved(${i})">✕</button>
        </div>
      </div>
    `).join('');
  }

  // Load history
  const histRes = await fetch('/api/user/history');
  const histData = await histRes.json();
  const histList = document.getElementById('historyList');
  if (histData.history.length === 0) {
    histList.innerHTML = '<p style="color:var(--muted);">No search history yet.</p>';
  } else {
    histList.innerHTML = histData.history.map(h => `
      <div class="history-item">
        <div>
          <div class="history-route">🚌 ${h.from} → ${h.to}</div>
          <div class="history-meta">
            ${h.result.totalDistance} km • Rs. ${h.result.fare.totalFare} •
            ${h.result.direct ? 'Direct' : 'Transfer at ' + h.result.transferStop} •
            ${new Date(h.searchedAt).toLocaleDateString()}
          </div>
        </div>
        <a href="/search" class="btn btn-secondary btn-sm">Search Again</a>
      </div>
    `).join('');
  }
}

async function deleteSaved(index) {
  if (!confirm('Remove this saved route?')) return;
  await fetch(`/api/user/saved/${index}`, { method: 'DELETE' });
  loadDashboard();
}

loadDashboard();
</script>
</body>
</html>
